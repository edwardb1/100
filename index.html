<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia - IG Style & Anti-Waton v10</title>
    <style>
        :root {
            --sky-top: #e67e22; --sky-bottom: #f39c12;
            --sun-core: #fffef0; --leaf-green: #2d5a27;
            --text-color: rgba(255, 255, 255, 0.95);
            --gold-gradient: linear-gradient(135deg, #f1c40f 0%, #f39c12 100%);
            /* Color del corazón de Instagram */
            --ig-heart: #ed4956; 
        }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; cursor: pointer; user-select: none; }
        
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        
        /* BANNER DE NOMBRE */
        .name-banner {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 150; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px);
            padding: 10px 40px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .name-text {
            font-size: 2rem; font-weight: 800; background: var(--gold-gradient);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* MENSAJE ANTI-POMPONPURIN (Discreto pero letal) */
        .anti-puddin {
            position: absolute; bottom: 10px; right: 15px; z-index: 200;
            color: rgba(255, 255, 255, 0.4); font-size: 0.7rem; font-style: italic;
            background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 5px;
            pointer-events: none;
        }

        /* CONTADOR CENTRAL */
        .counter-container {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            z-index: 100; text-align: center; background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px); padding: 30px 50px; border-radius: 25px;
            color: var(--text-color); pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .timer { font-size: 2.8rem; font-weight: bold; text-shadow: 0 2px 10px rgba(0,0,0,0.4); }
        .sub-timer { font-size: 1rem; margin-top: 5px; opacity: 0.8; font-style: italic; }

        /* --- CORAZÓN ESTILO INSTAGRAM (NUEVO) --- */
        .ig-heart-pop {
            position: absolute;
            color: var(--ig-heart);
            font-size: 80px; /* Tamaño grande inicial para el "pop" */
            pointer-events: none;
            z-index: 300; /* Por encima de todo */
            display: flex; justify-content: center; align-items: center;
            opacity: 0;
            /* Sombra suave de Instagram */
            filter: drop-shadow(0 0 10px rgba(237, 73, 86, 0.6));
            /* Animación de pop y desvanecimiento rápido */
            animation: igPop 1s ease-out forwards;
        }

        @keyframes igPop {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 0;
            }
            15% {
                /* El "pop" inicial rápido */
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 1;
            }
            30% {
                /* Pequeño rebote */
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                /* Desaparece flotando suavemente hacia arriba */
                transform: translate(-50%, -50%) scale(0.8) translateY(-50px);
                opacity: 0;
            }
        }

        /* HOJAS (MUCHAS MÁS MÁS MÁS) */
        .falling-leaf {
            position: absolute; background: var(--leaf-green);
            width: 14px; height: 8px; border-radius: 50% 0 50% 0;
            z-index: 5; pointer-events: none;
            animation: leafFall 7s linear forwards;
        }
        @keyframes leafFall {
            0% { transform: translate(0,0) rotate(0deg); opacity: 0.8; }
            100% { transform: translate(250px, 95vh) rotate(1440deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="spawnIGHeart(event)">

    <div class="name-banner">
        <div class="name-text">12/12</div>
    </div>

    <div class="anti-puddin">⚠️ Prohibido Pomponpurin. Muerte al pudín watón. Te odio.</div>

    <canvas id="landscape"></canvas>

    <div class="counter-container">
        <div class="counter-title">cada dia es un regalo</div>
        <div class="timer" id="main-timer">00d 00h 00m 00s</div>
        <div class="sub-timer" id="detail-timer">Calculando nuestra eternidad...</div>
    </div>

<script>
    const canvas = document.getElementById('landscape');
    const ctx = canvas.getContext('2d');
    
    let flowers = [];
    const FLOWER_COUNT = 65000;
    const startDate = new Date('2025-12-12T19:16:00');

    function initFlowers() {
        flowers = [];
        for (let i = 0; i < FLOWER_COUNT; i++) {
            flowers.push({
                x: Math.random(), y: Math.pow(Math.random(), 2), 
                hue: 40 + Math.random() * 15, sizeMult: Math.random() * 0.4 + 0.8
            });
        }
    }

    function getAtmosfere() {
        const hour = new Date().getHours();
        if (hour >= 6 && hour < 11) return { t: '#ff9a9e', b: '#feca57', s: '#fff', f: 45 }; 
        if (hour >= 11 && hour < 18) return { t: '#e67e22', b: '#f39c12', s: '#fffdf0', f: 45 };
        if (hour >= 18 && hour < 20) return { t: '#d35400', b: '#ff7f50', s: '#ffcc33', f: 35 };
        return { t: '#0a1931', b: '#162d4e', s: '#cccfcd', f: 20 };
    }

    function draw() {
        const w = canvas.width = window.innerWidth;
        const h = canvas.height = window.innerHeight;
        const atm = getAtmosfere();
        const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.6);
        skyGrad.addColorStop(0, atm.t); skyGrad.addColorStop(1, atm.b);
        ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, w, h);
        const sunX = w * 0.5, sunY = h * 0.25;
        const sunGlow = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 120);
        sunGlow.addColorStop(0, 'rgba(255, 255, 255, 0.3)'); sunGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sunGlow; ctx.beginPath(); ctx.arc(sunX, sunY, 120, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = atm.s; ctx.beginPath(); ctx.arc(sunX, sunY, 35, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#2d1b00"; ctx.beginPath(); ctx.moveTo(0, h * 0.55);
        for(let i=0; i<=w; i+=40) ctx.lineTo(i, h*0.55 + Math.sin(i*0.02)*4);
        ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.fill();
        flowers.forEach(f => {
            const px = f.x * w; const py = h * 0.55 + f.y * (h * 0.45);
            const size = (py - (h * 0.55)) * 0.04 * f.sizeMult + 1;
            ctx.fillStyle = `hsl(${f.hue}, 85%, ${atm.f}%)`;
            ctx.beginPath(); ctx.ellipse(px, py, size, size*1.2, f.hue, 0, Math.PI*2); ctx.fill();
        });
    }

    function updateCounter() {
        const diff = new Date() - startDate;
        const d = Math.floor(diff / 86400000);
        const h = Math.floor((diff / 3600000) % 24);
        const m = Math.floor((diff / 60000) % 60);
        const s = Math.floor((diff / 1000) % 60);
        document.getElementById('main-timer').innerHTML = `${d}d ${h.toString().padStart(2,'0')}h ${m.toString().padStart(2,'0')}m ${s.toString().padStart(2,'0')}s`;
        const totalHours = Math.floor(diff/3600000);
        document.getElementById('detail-timer').innerHTML = `Cada una de estas ${totalHours.toLocaleString()} horas ha sido perfecta contigo.`;
    }

    // --- LÓGICA DE CLIC ESTILO INSTAGRAM (NUEVA) ---
    // Usamos un limitador más estricto para simular la sensación de "snap"
    let lastIGHeartTime = 0;
    function spawnIGHeart(e) {
        if (new Date().getTime() - lastIGHeartTime < 250) return; // 4 por segundo máx.
        lastIGHeartTime = new Date().getTime();

        const heart = document.createElement('div');
        heart.className = 'ig-heart-pop';
        heart.innerHTML = '❤';
        
        // Centramos el corazón en el clic exacto
        heart.style.left = e.clientX + 'px';
        heart.style.top = e.clientY + 'px';
        
        document.body.appendChild(heart);
        
        // Lo borramos del DOM después de que termine la animación (1s)
        setTimeout(() => heart.remove(), 1000);
    }

    // LÓGICA DE HOJAS (MÁXIMA FRECUENCIA)
    function spawnLeaf() {
        const l = document.createElement('div');
        l.className = 'falling-leaf';
        l.style.left = Math.random() * 100 + 'vw'; l.style.top = '-20px';
        l.style.opacity = Math.random() * 0.5 + 0.3;
        l.style.animationDuration = (Math.random() * 3 + 5) + 's'; // Velocidades variables
        document.body.appendChild(l);
        setTimeout(() => l.remove(), 8000);
    }

    initFlowers();
    window.addEventListener('resize', draw);
    setInterval(updateCounter, 1000);
    // Una hoja cada 0.6 seg. para una lluvia constante
    setInterval(spawnLeaf, 600); 
    draw(); updateCounter();
</script>
</body>
</html>
